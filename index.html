<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B1B24" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Boat Log" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<title>Boat Log</title>
<style>
  :root{
    --ink:#0B1B24; --deep:#081821; --panel:#0E2632;
    --teal:#00C2AE; --tealdk:#0A8578; --wave:#2286A9;
    --amber:#DE9426; --red:#DE4F4F; --green:#2FA37A;
    --line:#E4EBEE; --line2:#EEF3F5; --tint:#F3F7F8; --canvas:#EFF4F5;
    --grey:#5F6E76; --grey2:#8CA0A8; --white:#fff;
    --shadow:0 1px 2px rgba(11,27,36,.05),0 6px 20px rgba(11,27,36,.06);
    --shadow2:0 2px 6px rgba(11,27,36,.08),0 14px 40px rgba(11,27,36,.14);
    --r:18px; --rs:12px;
    --ease:cubic-bezier(.32,.72,.33,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0;background:var(--canvas);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,textarea,select{font-family:inherit}
  img{display:block}
  .wrap{max-width:640px;margin:0 auto;min-height:100vh;padding-bottom:calc(92px + env(safe-area-inset-bottom))}
  .ic{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round;flex:none}
  .ic.sm{width:17px;height:17px;stroke-width:2}
  .ic.xs{width:14px;height:14px;stroke-width:2.2}

  /* ---------- header ---------- */
  header{background:
      radial-gradient(120% 90% at 85% -10%, rgba(0,194,174,.16), transparent 55%),
      linear-gradient(168deg,#10303F 0%,var(--deep) 72%);
    color:#fff;padding:calc(12px + env(safe-area-inset-top)) 18px 20px;position:relative;overflow:hidden}
  header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:22px;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 22" preserveAspectRatio="none"><path d="M0 12 Q50 3 100 12 T200 12 T300 12 T400 12 V22 H0 Z" fill="%23EFF4F5"/></svg>') repeat-x;
    background-size:400px 22px}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-weight:700;font-size:15px;letter-spacing:.01em;display:flex;align-items:center;gap:8px;color:#D9E8EB}
  .brand .mark{width:26px;height:26px;border-radius:8px;background:rgba(0,194,174,.14);
    display:flex;align-items:center;justify-content:center;color:var(--teal)}
  .brand .mark .ic{width:16px;height:16px;stroke-width:2}
  .mark img{width:100%;height:100%;object-fit:cover;border-radius:8px;display:block}
  .hico img{width:100%;height:100%;object-fit:cover;border-radius:9px;display:block}
  .logoprev{width:64px;height:64px;border-radius:16px;background:var(--tint);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--wave);overflow:hidden;flex:none}
  .logoprev img{width:100%;height:100%;object-fit:cover}
  .iconbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:#CFE2E6;
    border-radius:11px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    transition:transform .12s var(--ease),background .12s}
  .iconbtn:active{transform:scale(.94)}
  .iconbtn .ic{width:19px;height:19px}
  .hello{margin-top:16px}
  .hello .hi{font-size:24px;font-weight:800;letter-spacing:-.015em}
  .hello .sub{font-size:13px;color:#8FB0BB;margin-top:4px;display:flex;align-items:center;gap:7px}
  .hello .sub .sep{width:3px;height:3px;border-radius:50%;background:#41626D}
  .seg{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
    border-radius:12px;padding:3px;margin-top:14px;position:relative;z-index:2}
  .seg button{flex:1;background:none;border:none;border-radius:9px;padding:8px 0;font-size:13px;
    font-weight:700;color:#9FB8C0;transition:all .16s var(--ease)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.25)}

  /* ---------- layout ---------- */
  main{padding:16px 14px 8px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    margin-bottom:14px;overflow:hidden}
  .card>.hd{display:flex;align-items:center;gap:9px;padding:14px 16px 12px;border-bottom:1px solid var(--line2)}
  .card>.hd .hico{width:32px;height:32px;border-radius:9px;background:var(--tint);color:var(--wave);
    display:flex;align-items:center;justify-content:center;flex:none}
  .card>.hd .hico .ic{width:17px;height:17px}
  .card>.hd .hico.teal{background:#E1F6F2;color:var(--tealdk)}
  .card>.hd .hico.warn{background:#FBEFDB;color:#9C6410}
  .card>.hd .hico.bad{background:#FBE5E5;color:var(--red)}
  .card>.hd h2{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em;flex:1;min-width:0}
  .card>.hd .sub2{font-size:11.5px;color:var(--grey2);font-weight:600;margin-top:1px}
  .pill{font-size:11px;font-weight:800;border-radius:999px;padding:4px 10px;background:var(--tint);
    color:var(--grey);display:flex;align-items:center;gap:5px;flex:none}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--grey2)}
  .pill.good{background:#E1F6F2;color:var(--tealdk)} .pill.good .dot{background:var(--teal)}
  .pill.warn{background:#FBEFDB;color:#9C6410} .pill.warn .dot{background:var(--amber)}
  .pill.bad{background:#FBE5E5;color:#B43B3B} .pill.bad .dot{background:var(--red)}
  .pill.info{background:#E9F2F7;color:#1E6E92} .pill.info .dot{background:var(--wave)}

  .btn{background:var(--ink);color:#fff;border:none;border-radius:var(--rs);padding:12px 18px;
    font-size:14px;font-weight:800;display:inline-flex;align-items:center;gap:7px;justify-content:center;
    transition:transform .12s var(--ease),opacity .12s}
  .btn:active{transform:scale(.97)}
  .btn.teal{background:var(--teal);color:#04261F}
  .btn.ghost{background:var(--tint);color:var(--ink);border:1px solid var(--line);font-weight:700}
  .btn.slim{padding:9px 14px;font-size:13px;border-radius:10px}
  .mini{background:var(--tint);border:1px solid var(--line);border-radius:10px;padding:8px 12px;
    font-size:12.5px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:6px;
    transition:transform .12s var(--ease)}
  .mini:active{transform:scale(.96)}
  .mini.go{background:var(--teal);border-color:var(--teal);color:#04261F}
  .mini.line{background:#fff}
  .ibtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;
    color:var(--grey);display:inline-flex;align-items:center;justify-content:center;flex:none;
    transition:all .14s var(--ease)}
  .ibtn:active{transform:scale(.92)}
  .ibtn.armed{background:var(--red);border-color:var(--red);color:#fff}
  .ibtn .ic{width:15px;height:15px;stroke-width:2}

  /* ---------- tasks ---------- */
  .grp{border-bottom:1px solid var(--line2)} .grp:last-child{border-bottom:none}
  .grp>.ghd{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#FBFDFD;cursor:pointer;user-select:none}
  .grp>.ghd h3{margin:0;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--wave);flex:1;font-weight:800}
  .gcount{font-size:11px;font-weight:800;color:var(--grey2);font-variant-numeric:tabular-nums}
  .chev{color:#B9C6CC;transition:transform .18s var(--ease)}
  .chev .ic{width:15px;height:15px}
  .grp.open .chev{transform:rotate(90deg)}
  .glist{display:none} .grp.open .glist{display:block}
  .task{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-top:1px solid var(--line2)}
  .task:first-child{border-top:none}
  .cbx{flex:none;width:28px;height:28px;border-radius:50%;border:2px solid #C9D4D9;background:#fff;
    margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;
    transition:all .18s var(--ease)}
  .cbx .ic{width:15px;height:15px;stroke-width:2.6;opacity:0;transform:scale(.4);transition:all .18s var(--ease)}
  .task.done .cbx{background:var(--green);border-color:var(--green)}
  .task.done .cbx .ic{opacity:1;transform:scale(1)}
  .task.done .lbl{color:#9AA7AD;text-decoration:line-through;text-decoration-color:#C6D0D4}
  .tbody{flex:1;min-width:0}
  .lbl{font-size:14.5px;font-weight:650;line-height:1.35;letter-spacing:-.005em}
  .meta{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .chip{font-size:10px;font-weight:800;letter-spacing:.02em;padding:2.5px 8px;border-radius:999px;
    background:var(--tint);color:var(--grey)}
  .chip.eq{background:#E9F1F4;color:var(--wave)}
  .chip.salt{background:#E1F6F2;color:var(--tealdk)}
  .chip.gas{background:#FBE5E5;color:#B43B3B}
  .chip.man{background:#EFE9FA;color:#6A4FB8}
  .chip.trip{background:#E1F6F2;color:var(--tealdk)}
  .chip.note2{background:#FBEFDB;color:#9C6410}
  .note{font-size:11.5px;color:var(--grey);margin-top:4px;line-height:1.4}
  .st{font-size:12.5px;font-weight:800;margin-top:5px;display:flex;align-items:center;gap:5px}
  .st .ic{width:13px;height:13px;stroke-width:2.4}
  .st.ok{color:var(--green)} .st.soon{color:var(--amber)} .st.bad{color:var(--red)} .st.base{color:var(--wave)}
  .pbar{height:5px;background:var(--tint);border-radius:99px;overflow:hidden;margin-top:8px}
  .pbar i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .3s var(--ease)}
  .pbar i.warn{background:var(--amber)} .pbar i.bad{background:var(--red)}
  .actrow{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .due .task{border-left:3px solid transparent}
  .due .task.overdue{border-left-color:var(--red)}
  .due .task.soon{border-left-color:var(--amber)}

  /* inline forms */
  .inline{margin-top:10px;background:var(--tint);border:1px solid var(--line);border-radius:12px;
    padding:11px;display:none}
  .inline.show{display:block}
  .inline .frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .inline label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--wave);font-weight:800;display:block;margin-bottom:4px}
  .inline input{background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:9px 10px;
    font-size:15px;outline:none;min-width:0}
  .inline input:focus{border-color:var(--teal)}
  .inline .fnote{font-size:11px;color:var(--grey);margin-top:7px;line-height:1.4}

  /* history rows */
  .hist{border-top:1px solid var(--line2);background:#FBFDFD;padding:4px 16px 10px;display:none}
  .hist.show{display:block}
  .hrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
  .hrow:last-child{border-bottom:none}
  .hrow .hh{font-weight:800;font-variant-numeric:tabular-nums;min-width:64px}
  .hrow .hd2{color:var(--grey);flex:1}
  .hthumb{width:34px;height:34px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}

  /* ---------- meters (Today) ---------- */
  .meters{padding:6px 12px 10px}
  .mrow{display:flex;align-items:center;gap:11px;padding:10px 4px}
  .mrow+.mrow{border-top:1px dashed var(--line)}
  .mico{flex:none;width:40px;height:40px;border-radius:12px;background:var(--tint);color:var(--wave);
    display:flex;align-items:center;justify-content:center}
  .mico .ic{width:19px;height:19px}
  .mname{flex:1;min-width:0}
  .mname b{font-size:14px;letter-spacing:-.005em}
  .mlast{font-size:11.5px;color:var(--grey2);margin-top:1px}
  .mrow input{width:92px;font-size:20px;font-weight:800;text-align:right;color:var(--ink);
    border:none;border-bottom:2px solid var(--line);padding:3px 2px;outline:none;background:transparent;
    font-variant-numeric:tabular-nums}
  .mrow input:focus{border-bottom-color:var(--teal)}
  .mrow .delta{font-size:11px;font-weight:800;color:var(--tealdk);width:48px;text-align:right}
  .savebar{display:flex;justify-content:flex-end;padding:2px 14px 14px}
  .merr{font-size:12px;color:var(--red);padding:0 16px 10px;display:none;line-height:1.4}

  .ready{background:linear-gradient(135deg,#0F7D68,#0A8578);color:#fff;border-radius:var(--r);
    padding:16px;display:none;align-items:center;gap:13px;margin-bottom:14px;box-shadow:var(--shadow)}
  .ready.show{display:flex}
  .ready .rico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);
    display:flex;align-items:center;justify-content:center}
  .ready .big{font-size:15.5px;font-weight:800}
  .ready .sm{font-size:12px;opacity:.85;margin-top:2px}
  .prog{height:6px;background:#DDE7EA;border-radius:99px;overflow:hidden;margin:0 4px 14px}
  .prog i{display:block;height:100%;background:var(--teal);transition:width .3s var(--ease);border-radius:99px}
  .hint{font-size:12px;color:var(--grey2);text-align:center;margin:6px 10px 16px;line-height:1.5}

  /* ---------- hours ---------- */
  .meterhead{display:flex;align-items:center;gap:10px;padding:14px 16px 6px}
  .meterhead .big{font-size:34px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .meterhead .unit{font-size:12px;color:var(--grey2);font-weight:700}
  .meterhead .upd{margin-left:auto;font-size:11px;color:var(--grey2);text-align:right;line-height:1.35}
  .linkrow{display:flex;gap:14px;padding:2px 16px 12px}
  .linkbtn{background:none;border:none;padding:0;font-size:12px;font-weight:800;color:var(--wave);
    display:inline-flex;align-items:center;gap:5px}
  .linkbtn .ic{width:13px;height:13px;stroke-width:2.3}

  /* ---------- boat tab ---------- */
  .vrow{display:flex;gap:10px;padding:11px 16px;border-top:1px solid var(--line2);font-size:13.5px;align-items:flex-start}
  .vrow:first-of-type{border-top:none}
  .vrow .vk{flex:none;width:118px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--grey2);font-weight:800;padding-top:2.5px;line-height:1.5}
  .vrow .vv{flex:1;font-weight:650;min-width:0;overflow-wrap:break-word;line-height:1.5}
  .vrow .vv.vnone{color:#B9C6CC;font-weight:500}
  .docgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;padding:12px 16px 14px}
  .doc{position:relative;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--tint)}
  .doc img{width:100%;height:86px;object-fit:cover}
  .doc .dl{font-size:10.5px;font-weight:800;padding:6px 8px;color:var(--ink);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;background:#fff}
  .doc .dx{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:8px;border:none;
    background:rgba(8,24,33,.55);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .doc .dx.armed{background:var(--red)}
  .doc .dx .ic{width:12px;height:12px;stroke-width:2.4}
  .addtile{border:1.5px dashed #C4D2D8;border-radius:13px;min-height:112px;background:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--wave);
    font-size:11px;font-weight:800}

  .srow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--line2)}
  .srow:first-child{border-top:none}
  .srow.low{background:#FDF8EE}
  .sbody{flex:1;min-width:0}
  .sname{font-size:14px;font-weight:700;letter-spacing:-.005em}
  .ssub{font-size:11.5px;color:var(--grey);margin-top:2px}
  .qty{display:flex;align-items:center;gap:2px;background:var(--tint);border:1px solid var(--line);
    border-radius:11px;padding:2px}
  .qty button{width:30px;height:30px;border:none;background:none;font-size:17px;font-weight:800;color:var(--wave);border-radius:8px}
  .qty button:active{background:#E4EDF0}
  .qty .qn{min-width:26px;text-align:center;font-size:14.5px;font-weight:800;font-variant-numeric:tabular-nums}
  .parchip{font-size:10px;font-weight:800;color:var(--grey2);margin-top:2px;text-align:center}
  .shoprow{display:flex;align-items:center;gap:9px;padding:9px 16px;border-top:1px solid #F3E9D4;font-size:13.5px}
  .shoprow b{font-variant-numeric:tabular-nums}
  .quickchips{display:flex;flex-wrap:wrap;gap:7px;padding:2px 16px 14px}
  .qc{background:var(--tint);border:1px solid var(--line);border-radius:999px;padding:7px 12px;
    font-size:12px;font-weight:700;color:var(--ink)}

  /* ---------- log ---------- */
  .composer{padding:12px 14px 14px}
  .composer textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;
    font-size:15px;min-height:64px;resize:vertical;outline:none;line-height:1.4}
  .composer textarea:focus{border-color:var(--teal)}
  .composer .crow{display:flex;gap:8px;margin-top:9px;align-items:center;flex-wrap:wrap}
  .composer input[type=text]{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;
    font-size:14px;outline:none;min-width:130px}
  .composer input[type=text]:focus{border-color:var(--teal)}
  .segsm{display:flex;background:var(--tint);border:1px solid var(--line);border-radius:11px;padding:2.5px}
  .segsm button{border:none;background:none;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:800;color:var(--grey)}
  .segsm button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(11,27,36,.12)}
  .attach{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .attach .athumb{position:relative}
  .attach img{width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--line)}
  .attach .ax{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;
    background:var(--ink);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
  .logday{padding:12px 16px 4px;font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--wave);font-weight:800}
  .logrow{display:flex;gap:10px;padding:11px 16px;border-top:1px solid var(--line2);font-size:13.5px;align-items:flex-start}
  .logrow .t{color:var(--grey2);flex:none;width:58px;font-variant-numeric:tabular-nums;font-size:11.5px;padding-top:2.5px;white-space:nowrap}
  .lbody{flex:1;min-width:0}
  .logrow b{font-weight:700;letter-spacing:-.005em}
  .lsub{margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--grey)}
  .lsub .ic{width:12px;height:12px;stroke-width:2.2}
  .lthumbs{display:flex;gap:6px;margin-top:7px}
  .lthumbs img{width:58px;height:58px;border-radius:10px;object-fit:cover;border:1px solid var(--line)}

  /* ---------- nav ---------- */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(252,254,254,.965);backdrop-filter:blur(14px) saturate(1.6);
    -webkit-backdrop-filter:blur(14px) saturate(1.6);border-top:1px solid rgba(11,27,36,.07);display:flex;z-index:30;
    padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:8px 0 7px;font-size:10px;font-weight:700;
    color:#93A3AA;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;
    transition:color .15s;letter-spacing:.01em}
  nav button.on{color:var(--tealdk);font-weight:800}
  nav button .bub{position:absolute;top:3px;left:calc(50% + 7px);background:var(--red);color:#fff;
    font-size:9.5px;font-weight:800;border-radius:99px;min-width:16px;height:16px;padding:0 4px;
    display:flex;align-items:center;justify-content:center;border:2px solid #fff}

  /* ---------- overlays ---------- */
  .ov{position:fixed;inset:0;background:rgba(8,24,33,.5);z-index:50;display:none;align-items:flex-end;
    justify-content:center;backdrop-filter:blur(2px)}
  .ov.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:640px;border-radius:24px 24px 0 0;padding:10px 18px calc(24px + env(safe-area-inset-bottom));
    max-height:90vh;overflow:auto;animation:up .28s var(--ease)}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .handle{width:38px;height:5px;border-radius:99px;background:#D8E1E5;margin:2px auto 14px}
  .sheet h2{margin:0 0 4px;font-size:19px;letter-spacing:-.01em}
  .sheet .sub{font-size:13px;color:var(--grey);margin:0 0 16px;line-height:1.45}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--wave);
    font-weight:800;margin-bottom:6px}
  .f input[type=text],.f input[type=number],.f input[type=date]{width:100%;font-size:16px;padding:12px;
    border:1.5px solid var(--line);border-radius:12px;outline:none;background:#fff}
  .f input:focus{border-color:var(--teal)}
  .segs{display:flex;flex-wrap:wrap;gap:7px}
  .segs button{background:var(--tint);border:1.5px solid var(--line);border-radius:11px;
    padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--ink);transition:all .13s}
  .segs button.on{background:#E1F6F2;border-color:var(--teal);color:var(--tealdk);font-weight:800}
  .sheet .btn{width:100%;margin-top:6px;padding:14px;font-size:15px}
  .lightbox{position:fixed;inset:0;background:rgba(4,12,17,.93);z-index:70;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .lightbox.show{display:flex}
  .lightbox img{max-width:94vw;max-height:80vh;border-radius:12px;object-fit:contain}
  .lightbox .lx{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px}
  #toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:700;border-radius:12px;padding:11px 18px;
    z-index:80;opacity:0;pointer-events:none;transition:all .22s var(--ease);box-shadow:var(--shadow2);
    max-width:86vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{padding:26px 18px;text-align:center;color:var(--grey2)}
  .empty .ic{width:30px;height:30px;margin:0 auto 8px;stroke-width:1.5;color:#B9C6CC}
  .empty .et{font-size:13px;line-height:1.5}
</style>

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const I=(n,cls)=>`<svg class="ic${cls?' '+cls:''}"><use href="#i-${n}"/></svg>`;
function toast(txt){const t=$('#toast');t.textContent=txt;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300)}
function fmtD(d,withYear){const dt=(d instanceof Date)?d:new Date(d);
  const o={month:'short',day:'numeric'};if(withYear||dt.getFullYear()!==now().getFullYear())o.year='numeric';
  return dt.toLocaleDateString(undefined,o)}
function fmtT(ts){return new Date(ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}

/* ---------- state + migration ---------- */
const KEY='boatlog.v3', OLDKEY='boatlog.v2';
let S=load();
function load(){
  try{const v3=JSON.parse(localStorage.getItem(KEY));if(v3)return v3}catch(e){}
  try{const v2=JSON.parse(localStorage.getItem(OLDKEY));
    if(v2&&(v2.cfg||v2.meters||v2.log)){const s=migrate(v2);s._mig=true;return s}}catch(e){}
  return{}}
function migrate(o){
  const s={cfg:o.cfg||null,role:o.role||'mate',view:'today',
    meters:o.meters||{},done:o.done||{},rt:o.rt||{},cal:o.cal||{},
    mHist:{},rtHist:{},items:[],vessel:{docs:[]},log:[]};
  Object.entries(s.meters).forEach(([id,rec])=>{if(rec)s.mHist[id]=[{h:rec.h,ts:rec.ts}]});
  Object.entries(s.rt).forEach(([inst,rec])=>{if(rec)s.rtHist[inst]=[{id:uid(),h:rec.h,d:rec.d}]});
  s.log=(o.log||[]).map(e=>({id:uid(),ts:e.ts,type:'auto',txt:e.txt,h:e.h??null,role:e.role||'mate'}));
  return s}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
S.cfg=S.cfg||null; S.role=S.role||'mate'; S.view=S.view||'today';
S.meters=S.meters||{}; S.mHist=S.mHist||{}; S.done=S.done||{};
S.rt=S.rt||{}; S.rtHist=S.rtHist||{}; S.cal=S.cal||{};
S.log=S.log||[]; S.items=S.items||[]; S.vessel=S.vessel||{docs:[]}; S.vessel.docs=S.vessel.docs||[];
if(S._mig){delete S._mig;save()}

function weekKey(){const d=now(),y=d.getFullYear(),o=new Date(y,0,1);
  return y+'-W'+Math.ceil(((d-o)/864e5+o.getDay()+1)/7)}
const monthKey=()=>now().toISOString().slice(0,7);
const pKey=c=>c==='pre'||c==='post'?todayISO():c==='weekly'?weekKey():c==='monthly'?monthKey():'x';
const dk=t=>t.id+'@'+pKey(t.cad);
function logIt(txt,h,type){S.log.unshift({id:uid(),ts:Date.now(),type:type||'auto',txt,h:h??null,role:S.role});
  if(S.log.length>500)S.log.length=500}

/* ---------- photo store (IndexedDB) ---------- */
const PB={db:null,
  open(){return this.db?Promise.resolve(this.db):new Promise((res,rej)=>{
    const r=indexedDB.open('boatlog-ph',1);
    r.onupgradeneeded=e=>{e.target.result.createObjectStore('p')};
    r.onsuccess=e=>{this.db=e.target.result;res(this.db)};
    r.onerror=()=>rej(r.error)})},
  async put(id,blob){const db=await this.open();return new Promise((res,rej)=>{
    const t=db.transaction('p','readwrite');t.objectStore('p').put(blob,id);
    t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})},
  async get(id){const db=await this.open();return new Promise(res=>{
    const q=db.transaction('p').objectStore('p').get(id);
    q.onsuccess=()=>res(q.result||null);q.onerror=()=>res(null)})},
  async del(id){if(!id)return;const db=await this.open();return new Promise(res=>{
    const t=db.transaction('p','readwrite');t.objectStore('p').delete(id);
    t.oncomplete=res;t.onerror=res})}};
const PURL=new Map();
async function phURL(id){if(!id)return null;if(PURL.has(id))return PURL.get(id);
  const b=await PB.get(id);if(!b)return null;
  const u=URL.createObjectURL(b);PURL.set(id,u);return u}
async function shrink(file){
  const url=URL.createObjectURL(file);
  const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url});
  const mx=1400,sc=Math.min(1,mx/Math.max(img.naturalWidth,img.naturalHeight));
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(img.naturalWidth*sc));c.height=Math.max(1,Math.round(img.naturalHeight*sc));
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  URL.revokeObjectURL(url);
  return new Promise(res=>c.toBlob(b=>res(b||file),'image/jpeg',.74))}
async function shrinkSq(file,px=512){
  const url=URL.createObjectURL(file);
  const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url});
  const s=Math.min(img.naturalWidth,img.naturalHeight);
  const sx=(img.naturalWidth-s)/2, sy=(img.naturalHeight-s)/2;
  const c=document.createElement('canvas');c.width=c.height=Math.max(1,Math.min(px,s));
  c.getContext('2d').drawImage(img,sx,sy,s,s,0,0,c.width,c.height);
  URL.revokeObjectURL(url);
  return new Promise(res=>c.toBlob(b=>res(b||file),'image/jpeg',.82))}
function pickPhoto(cb,opts){const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  if(!(opts&&opts.square))inp.setAttribute('capture','environment');
  inp.onchange=async()=>{const f=inp.files&&inp.files[0];if(!f)return;
    try{const blob=await (opts&&opts.square?shrinkSq(f):shrink(f));const id='ph_'+uid();await PB.put(id,blob);cb(id)}
    catch(e){toast('Could not read that photo')}};
  inp.click()}
async function hydrate(root){
  for(const el of (root||document).querySelectorAll('img[data-ph]')){
    const u=await phURL(el.dataset.ph);
    if(u){el.src=u;el.onclick=e=>{e.stopPropagation();openLB(u)}}
    else el.closest('.athumb,.doc,.lthumbs')?.remove?.()}}
function openLB(u){$('#lbimg').src=u;$('#lb').classList.add('show')}
$('#lbx').onclick=()=>$('#lb').classList.remove('show');
$('#lb').onclick=e=>{if(e.target.id==='lb')$('#lb').classList.remove('show')};

/* ---------- two-tap delete ---------- */
let ARM=null,ARMT=null;
function armBtn(btn,fn){btn.addEventListener('click',e=>{e.stopPropagation();
  if(ARM===btn){clearTimeout(ARMT);btn.classList.remove('armed');ARM=null;buzz();fn()}
  else{if(ARM)ARM.classList.remove('armed');ARM=btn;btn.classList.add('armed');
    clearTimeout(ARMT);ARMT=setTimeout(()=>{btn.classList.remove('armed');if(ARM===btn)ARM=null},2600);

/* ---------- config-driven model ---------- */
function meterDefs(){ if(!S.cfg)return[];
  const m=[],eng=S.cfg.engines;
  if(eng===2){m.push({id:'eng1',name:'Port Engine',kind:'eng'});
              m.push({id:'eng2',name:'Stbd Engine',kind:'eng'});}
  else m.push({id:'eng1',name:S.cfg.engType==='outboard'?'Outboard':'Main Engine',kind:'eng'});
  if(S.cfg.gen)m.push({id:'gen',name:'Generator',kind:'gen'});
  return m}
const mName=id=>meterDefs().find(x=>x.id===id)?.name||id;
function applies(t){ const c=S.cfg; if(!c)return false;
  if(t.salt&&!c.salt)return false;
  if(t.gas&&c.fuel!=='gas')return false;
  if(t.engType&&t.engType!==c.engType)return false;
  if(t.needs==='gen'&&!c.gen)return false;
  if(t.needs==='ac'&&!c.ac)return false;
  if(t.needs==='trailer'&&!c.trailer)return false;
  return true}
function roleOK(t){ if(S.role===t.aud)return true;
  if(S.role==='captain'&&t.aud==='mate')return true;
  if(S.role==='owner')return true; return false}
function rtInstances(){ const out=[];
  TASKS.filter(t=>t.cad==='rt'&&applies(t)).forEach(t=>{
    meterDefs().filter(m=>m.kind===t.meter).forEach(m=>{
      out.push({t,m,inst:t.id+'@'+m.id})})});
  return out}

/* latest record wins: sorted by date then hours */
function recomputeRt(inst){const h=S.rtHist[inst]||[];
  if(!h.length){delete S.rt[inst];return}
  const sorted=[...h].sort((a,b)=>(a.d===b.d?(a.h??0)-(b.h??0):a.d<b.d?-1:1));
  const last=sorted[sorted.length-1];
  S.rt[inst]={h:last.h,d:last.d};if(last.manual)S.rt[inst].manual=true}
function addRtRecord(inst,rec){(S.rtHist[inst]=S.rtHist[inst]||[]).push({id:uid(),...rec});
  if(S.rtHist[inst].length>60)S.rtHist[inst].shift();
  recomputeRt(inst)}

function rtStatus(x){ const rec=S.rt[x.inst]; const cur=S.meters[x.m.id]?.h;
  if(rec==null) return {cls:'base',txt:'No baseline yet — set when it was last done',pct:0};
  if(x.t.once&&rec) return {cls:'ok',txt:'Done (one-time service)',pct:100};
  const dueH=rec.h+x.t.iv;
  const hLeft=cur!=null?dueH-cur:null;
  let dLeft=null,dueDate=null;
  if(x.t.calM){dueDate=new Date(rec.d);dueDate.setMonth(dueDate.getMonth()+x.t.calM);
    dLeft=Math.ceil((dueDate-now())/864e5)}
  const hoursOver=hLeft!=null&&hLeft<=0, dateOver=dLeft!=null&&dLeft<=0;
  const hoursSoon=hLeft!=null&&hLeft<=Math.max(25,x.t.iv*.15), dateSoon=dLeft!=null&&dLeft<=30;
  const pct=cur!=null?Math.min(100,Math.max(0,Math.round((cur-rec.h)/x.t.iv*100))):0;
  const dd=dueDate?fmtD(dueDate):null;
  if(hoursOver||dateOver)return{cls:'bad',pct:100,
    txt:hoursOver?(hLeft===0?`Due now — at ${dueH} hrs`:`Overdue by ${Math.abs(hLeft)} hrs (due at ${dueH})`):`Overdue — was due ${dd}`};
  if(hoursSoon||dateSoon)return{cls:'soon',pct,
    txt:hLeft!=null?`Due soon — ${hLeft} hrs to go (at ${dueH}${dd?` or ${dd}`:''})`:`Due soon — by ${dd}`};
  return{cls:'ok',pct,
    txt:hLeft!=null?`On track — next at ${dueH} hrs${dd?` or ${dd}`:''} (${hLeft} to go)`:`On track — next by ${dd}`}}
function calStatus(t){ const last=S.cal[t.id];
  if(!last)return{cls:'base',txt:'No baseline — set when it was last done'};
  const due=new Date(last);due.setMonth(due.getMonth()+t.calM);
  const dLeft=Math.ceil((due-now())/864e5);
  const dd=fmtD(due,true);
  if(dLeft<=0)return{cls:'bad',txt:`Overdue — was due ${dd}`};
  if(dLeft<=30)return{cls:'soon',txt:`Due soon — ${dd}`};
  return{cls:'ok',txt:`Next due ${dd}`}}
function dueList(){ const out=[];
  rtInstances().forEach(x=>{const st=rtStatus(x);
    if(st.cls==='bad'||st.cls==='soon')out.push({kind:'rt',x,st})});
  TASKS.filter(t=>t.cad==='cal'&&applies(t)).forEach(t=>{const st=calStatus(t);
    if(st.cls==='bad'||st.cls==='soon')out.push({kind:'cal',t,st})});
  out.sort((a,b)=>(a.st.cls==='bad'?0:1)-(b.st.cls==='bad'?0:1));
  return out}
function shopList(){return S.items.filter(i=>i.par>0&&(i.qty||0)<i.par)
  .map(i=>({...i,need:i.par-(i.qty||0)}))}

/* ---------- meter ops ---------- */
function setMeter(id,h,manual){const prev=S.meters[id];
  S.meters[id]={h,ts:Date.now()};if(manual)S.meters[id].manual=true;
  (S.mHist[id]=S.mHist[id]||[]).push({h,ts:Date.now(),manual:!!manual});
  if(S.mHist[id].length>200)S.mHist[id].shift();
  logIt(`${manual?'Hours corrected':'Hours logged'} — ${mName(id)}: ${h}`,h);
  return prev}
function delReading(id,idx){const hist=S.mHist[id]||[];const rec=hist[idx];if(!rec)return;
  hist.splice(idx,1);
  const last=hist[hist.length-1];
  if(last)S.meters[id]={h:last.h,ts:last.ts,...(last.manual?{manual:true}:{})};
  else delete S.meters[id];
  logIt(`Reading removed — ${mName(id)}: ${rec.h} hrs`,null);
  save();draw();toast('Reading deleted')}

/* ---------- shared renderers ---------- */
function chips(t,extra){let h=`<span class="chip eq">${esc(t.eq)}</span>`;
  if(t.salt)h+=`<span class="chip salt">SALT</span>`;
  if(t.gas)h+=`<span class="chip gas">GAS</span>`;
  if(extra)h+=extra; return h}
function taskRow(t){ const k=dk(t);const isDone=!!S.done[k];
  const div=document.createElement('div');div.className='task'+(isDone?' done':'');
  div.innerHTML=`<div class="cbx">${I('check')}</div><div class="tbody">
    <div class="lbl">${esc(t.t)}</div><div class="meta">${chips(t)}</div>
    ${t.note?`<div class="note">${esc(t.note)}</div>`:''}
    ${isDone?`<div class="note">Done ${fmtT(S.done[k].ts)} · ${S.done[k].role}</div>`:''}</div>`;
  div.onclick=()=>{buzz();
    if(S.done[k]){delete S.done[k]}
    else{S.done[k]={ts:Date.now(),role:S.role};logIt(t.t)}
    save();draw()};
  return div}
function group(title,tasks,openDefault){ const g=document.createElement('div');
  const doneN=tasks.filter(t=>S.done[dk(t)]).length;
  const open=openDefault??(doneN<tasks.length);
  g.className='grp'+(open?' open':'');
  g.innerHTML=`<div class="ghd"><h3>${esc(title)}</h3>
    <span class="gcount">${doneN}/${tasks.length}</span><span class="chev">${I('chev')}</span></div>
    <div class="glist"></div>`;
  const list=g.querySelector('.glist');
  tasks.forEach(t=>list.appendChild(taskRow(t)));
  g.querySelector('.ghd').onclick=()=>g.classList.toggle('open');
  return g}
function cardEl(icon,title,pillHTML,tone){const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="hd"><span class="hico ${tone||''}">${I(icon)}</span><h2>${title}</h2>${pillHTML||''}</div>`;
  return c}

/* ---------- service completion ---------- */
function markRt(x){ const cur=S.meters[x.m.id]?.h;
  if(cur==null){toast(`Log ${x.m.name} hours first — services record at a meter reading`);return}
  addRtRecord(x.inst,{h:cur,d:todayISO()});
  logIt(`${x.t.t} — ${x.m.name}`,cur);save();draw();
  toast('Service logged — add a proof photo from its history');buzz()}
function markCal(t,dateISO){S.cal[t.id]=dateISO||todayISO();
  logIt(t.t+(dateISO&&dateISO!==todayISO()?` (backdated ${fmtD(dateISO,true)})`:''));
  save();draw();buzz()}

/* ---------- views ---------- */
function vToday(m){
  const card=cardEl('gauge','Log today’s hours',`<span class="pill info" id="mtag"><span class="dot"></span><span></span></span>`);
  card.querySelector('.hico').classList.add('teal');
  const body=document.createElement('div');body.className='meters';body.id='mrows';card.appendChild(body);
  const err=document.createElement('div');err.className='merr';err.id='merr';card.appendChild(err);
  const sb=document.createElement('div');sb.className='savebar';
  sb.innerHTML=`<button class="btn teal" id="msave">${I('check','sm')} Save readings</button>`;card.appendChild(sb);
  meterDefs().forEach(md=>{const rec=S.meters[md.id];
    const r=document.createElement('div');r.className='mrow';
    r.innerHTML=`<div class="mico">${I(md.kind==='gen'?'bolt':'gauge')}</div>
      <div class="mname"><b>${md.name}</b><div class="mlast">${rec?`last ${rec.h} hrs · ${fmtD(rec.ts)}${rec.manual?' · corrected':''}`:'no reading yet'}</div></div>
      <input inputmode="decimal" type="number" step="0.1" data-m="${md.id}" placeholder="${rec?rec.h:'0'}">
      <div class="delta" data-d="${md.id}"></div>`;
    body.appendChild(r)});
  const anyRec=meterDefs().some(md=>S.meters[md.id]);
  card.querySelector('#mtag span:last-child').textContent=anyRec?'tracking':'start here';
  card.querySelector('#msave').onclick=()=>{
    err.style.display='none';let saved=0;
    for(const inp of card.querySelectorAll('input[data-m]')){
      const v=inp.value.trim();if(v==='')continue;
      const nv=+v;const id=inp.dataset.m;const rec=S.meters[id];
      if(!isFinite(nv)||nv<0)continue;
      if(rec&&nv<rec.h&&!inp.dataset.force){
        err.textContent=`${mName(id)}: ${nv} is lower than last (${rec.h}). Tap Save again to confirm (typo fix / meter change) — or use Edit on the Hours tab.`;
        err.style.display='block';inp.dataset.force='1';return}
      const wasManual=rec&&nv<rec.h;
      setMeter(id,nv,wasManual);
      card.querySelector(`[data-d="${id}"]`).textContent=rec?(nv>=rec.h?`+${(nv-rec.h).toFixed(1)}`:'set'):'set';
      saved++}
    if(saved){save();buzz();setTimeout(draw,320)}};
  m.appendChild(card);

  const due=dueList();
  if(due.length){
    const bad=due.some(d=>d.st.cls==='bad');
    const dcard=cardEl('wrench','Service triggered',
      `<span class="pill ${bad?'bad':'warn'}"><span class="dot"></span>${due.length} due</span>`,bad?'bad':'warn');
    dcard.classList.add('due');
    due.forEach(d=>{const row=document.createElement('div');
      row.className='task '+(d.st.cls==='bad'?'overdue':'soon');
      if(d.kind==='rt'){row.innerHTML=`<div class="tbody">
        <div class="lbl">${esc(d.x.t.t)}</div>
        <div class="meta">${chips(d.x.t,`<span class="chip">${d.x.m.name}</span><span class="chip">every ${d.x.t.iv} hrs${d.x.t.calM?' / '+d.x.t.calM+' mo':''}</span>`)}</div>
        <div class="st ${d.st.cls}">${I(d.st.cls==='bad'?'alert':'clock','xs')} ${d.st.txt}</div>
        <div class="actrow"><button class="mini go">${I('check','xs')} Done today at ${S.meters[d.x.m.id]?.h??'—'} hrs</button></div></div>`;
        row.querySelector('.mini').onclick=e=>{e.stopPropagation();markRt(d.x)}}
      else{row.innerHTML=`<div class="tbody"><div class="lbl">${esc(d.t.t)}</div>
        <div class="meta">${chips(d.t,`<span class="chip">every ${d.t.calM} mo</span>`)}</div>
        <div class="st ${d.st.cls}">${I(d.st.cls==='bad'?'alert':'clock','xs')} ${d.st.txt}</div>
        <div class="actrow"><button class="mini go">${I('check','xs')} Done today</button></div></div>`;
        row.querySelector('.mini').onclick=e=>{e.stopPropagation();markCal(d.t)}}
      dcard.appendChild(row)});
    m.appendChild(dcard)}

  const pre=TASKS.filter(t=>t.cad==='pre'&&applies(t)&&roleOK(t));

  ready.innerHTML=`<div class="rico">${I('check')}</div><div><div class="big">Vessel ready</div>
    <div class="sm">Pre-departure complete — ${preDone}/${pre.length} · logged by ${S.role}</div></div>`;
  m.appendChild(ready);
  const prog=document.createElement('div');prog.className='prog';
  prog.innerHTML=`<i style="width:${pre.length?Math.round(preDone/pre.length*100):0}%"></i>`;
  m.appendChild(prog);
  const pcard=cardEl('sun','Pre-departure',`<span class="pill"><span class="dot"></span>${preDone}/${pre.length}</span>`);
  ['Engine & Systems','Safety (USCG)','Departure'].forEach(gname=>{
    const gt=pre.filter(t=>t.g===gname);if(gt.length)pcard.appendChild(group(gname,gt))});
  m.appendChild(pcard);

  const post=TASKS.filter(t=>t.cad==='post'&&applies(t)&&roleOK(t));
  const postDone=post.filter(t=>S.done[dk(t)]).length;
  const pt=cardEl('moon','Post-trip',`<span class="pill"><span class="dot"></span>${postDone}/${post.length}</span>`);
  pt.appendChild(group('Wash down & shutdown',post,postDone>0&&postDone<post.length));
  m.appendChild(pt);

  const hint=document.createElement('p');hint.className='hint';
  hint.textContent='Checklists reset each day. Hours logged here drive every service clock automatically.';
  m.appendChild(hint)}

function vHours(m){
  const insts=rtInstances();
  meterDefs().forEach(md=>{
    const rec=S.meters[md.id];

          <button class="mini line" data-a="setlast">${I('pencil','xs')} Set last done…</button>
          ${recs.length?`<button class="mini line" data-a="rh">${I('hist','xs')} ${recs.length}</button>`:''}
        </div>
        <div class="inline" data-f="setlast">
          <div class="frow">
            <div><label>Hours</label><input type="number" step="0.1" inputmode="decimal" style="width:96px" placeholder="e.g. 1240"></div>
            <div><label>Date</label><input type="date" value="${todayISO()}" max="${todayISO()}"></div>
            <button class="btn slim teal" style="margin-top:14px">Save</button></div>
          <div class="fnote">Backfill when this was actually last serviced — the clock starts there. A wrong number is worse than an absent one.</div>
        </div>
        <div class="hist" data-f="rh"></div></div>`;

      row.querySelector('[data-a=setlast]').onclick=()=>slf.classList.toggle('show');
      slf.querySelector('.btn').onclick=()=>{
        const hv2=+slf.querySelector('input[type=number]').value;
        const dv=slf.querySelector('input[type=date]').value;
        if(!isFinite(hv2)||hv2<0||!dv){toast('Enter hours and a date');return}
        const cur=S.meters[x.m.id]?.h;
        if(cur!=null&&hv2>cur){toast(`That's above the current meter (${cur}). Check the number.`);return}
        addRtRecord(x.inst,{h:hv2,d:dv,manual:true});
        logIt(`Baseline set — ${x.t.t} (${x.m.name}): ${hv2} hrs, ${fmtD(dv,true)}`,hv2);
        save();draw();toast('Baseline saved')};
      const rh=row.querySelector('[data-f=rh]');
      if(rh){recs.slice().reverse().forEach(r0=>{
          const hr=document.createElement('div');hr.className='hrow';
          hr.innerHTML=`<span class="hh">${r0.h} hrs</span>
            <span class="hd2">${fmtD(r0.d,true)}${r0.manual?' · <b>manual</b>':''}</span>
            ${r0.ph?`<img class="hthumb" data-ph="${r0.ph}" alt="proof">`:`<button class="ibtn" data-a="cam">${I('cam')}</button>`}
            <button class="ibtn" data-a="del">${I('trash')}</button>`;
          const cam=hr.querySelector('[data-a=cam]');
          if(cam)cam.onclick=e=>{e.stopPropagation();pickPhoto(async id=>{r0.ph=id;save();draw();toast('Proof photo attached')})};
          armBtn(hr.querySelector('[data-a=del]'),async()=>{
            await PB.del(r0.ph);
            const arr=S.rtHist[x.inst];arr.splice(arr.indexOf(r0),1);
            recomputeRt(x.inst);
            logIt(`Service record removed — ${x.t.t} (${r0.h} hrs)`);
            save();draw();toast('Record deleted')});
          rh.appendChild(hr)});
        const rbtn=row.querySelector('[data-a=rh]');
        if(rbtn)rbtn.onclick=()=>rh.classList.toggle('show')}
      card.appendChild(row)});
    m.appendChild(card)});
  const hint=document.createElement('p');hint.className='hint';
  hint.textContent='"Whichever comes first": every service fires on run-hours OR its calendar backstop. Edit hours, backfill baselines, and delete mistakes right here.';
  m.appendChild(hint)}

function vBoat(m){
  /* vessel record */
  const v=S.vessel;
  const vc=cardEl('boat',S.cfg?esc(S.cfg.name):'Vessel',
    `<button class="ibtn" id="vedit">${I('pencil')}</button>`,'teal');

      <button class="dx">${I('x')}</button>`;

      save();draw();toast('Document deleted')});
    grid.appendChild(t)});
  const add=document.createElement('button');add.className='addtile';

  grid.appendChild(add);
  dc.appendChild(grid);
  const dh=document.createElement('div');dh.className='note';dh.style.cssText='padding:0 16px 13px';

  /* shopping list */

    low.forEach(i=>{const r=document.createElement('div');r.className='shoprow';
      r.innerHTML=`<span style="flex:1">${esc(i.name)}${i.part?` <span class="note" style="display:inline">· ${esc(i.part)}</span>`:''}</span><b>need ${i.need}</b>`;
      sc.appendChild(r)});
    const ar=document.createElement('div');ar.className='savebar';ar.style.paddingTop='10px';
    ar.innerHTML=`<button class="btn ghost slim" id="copyshop">${I('copy','sm')} Copy list</button>`;
    sc.appendChild(ar);
    sc.querySelector('#copyshop').onclick=async()=>{
      const txt='Boat supplies needed — '+(S.cfg?.name||'boat')+':\n'+
        low.map(i=>`• ${i.name}${i.part?' ('+i.part+')':''} × ${i.need}`).join('\n');
      try{if(navigator.share){await navigator.share({text:txt})}
        else{await navigator.clipboard.writeText(txt);toast('List copied')}}
      catch(e){try{await navigator.clipboard.writeText(txt);toast('List copied')}catch(_){toast('Could not copy')}}};
    m.appendChild(sc)}

  /* supplies */
  const cats=['Oil & Fluids','Filters','Belts & Impellers','Zincs & Hardware','Cleaning & Finish','Safety','Other'];
  const sc2=cardEl('box','Supplies & favorites',
    `<button class="ibtn" id="iadd">${I('plus')}</button>`);
  if(!S.items.length){
    const e=document.createElement('div');e.className='empty';
    e.innerHTML=`${I('box')}<div class="et">Keep the boat’s staples here — the exact oil, filters, belts, cleaners and wax that work — with par levels so you always know what to buy.</div>`;
    sc2.appendChild(e);
    const qc=document.createElement('div');qc.className='quickchips';
    [['Engine oil','Oil & Fluids'],['Oil filter','Filters'],['Fuel filter / separator','Filters'],
     ['Raw-water impeller','Belts & Impellers'],['Serpentine belt','Belts & Impellers'],
     ['Zinc anodes','Zincs & Hardware'],['Boat soap','Cleaning & Finish'],['Vinyl protectant','Cleaning & Finish'],
     ['Wax / sealant','Cleaning & Finish'],['Gasket / sealant','Zincs & Hardware']]
      .forEach(([n,c0])=>{const b=document.createElement('button');b.className='qc';b.textContent='+ '+n;
        b.onclick=()=>itemSheet({name:n,cat:c0});qc.appendChild(b)});
    sc2.appendChild(qc)}
  cats.forEach(cat=>{
    const items=S.items.filter(i=>i.cat===cat);
    if(!items.length)return;
    const gh=document.createElement('div');gh.className='logday';gh.textContent=cat;sc2.appendChild(gh);
    items.forEach(i=>{const r=document.createElement('div');
      const isLow=i.par>0&&(i.qty||0)<i.par;
      r.className='srow'+(isLow?' low':'');
      r.innerHTML=`<div class="sbody"><div class="sname">${esc(i.name)}</div>
        <div class="ssub">${[i.part,i.note].filter(Boolean).map(esc).join(' · ')||''}</div></div>
        <div><div class="qty"><button data-a="minus">−</button><span class="qn">${i.qty||0}</span><button data-a="plus">+</button></div>
        ${i.par>0?`<div class="parchip">par ${i.par}${isLow?' · low':''}</div>`:''}</div>
        <button class="ibtn" data-a="edit">${I('pencil')}</button>`;
      r.querySelector('[data-a=minus]').onclick=()=>{i.qty=Math.max(0,(i.qty||0)-1);save();draw()};
      r.querySelector('[data-a=plus]').onclick=()=>{i.qty=(i.qty||0)+1;save();draw()};
      r.querySelector('[data-a=edit]').onclick=()=>itemSheet(i);
      sc2.appendChild(r)})});
  sc2.querySelector('#iadd').onclick=()=>itemSheet();
  m.appendChild(sc2);
  const hint=document.createElement('p');hint.className='hint';
  hint.textContent='Everything on this tab travels with the boat: identity, paperwork, and the parts that keep it running.';
  m.appendChild(hint)}

function vLog(m){
  const c=cardEl('pencil','New entry');
  const comp=document.createElement('div');comp.className='composer';
  comp.innerHTML=`
    <div class="crow" style="margin:0 0 9px">
      <div class="segsm" id="ltype"><button data-t="note" class="on">Note</button><button data-t="trip">Trip</button></div>
      <button class="ibtn" id="lcam" style="margin-left:auto">${I('cam')}</button>
    </div>
    <textarea id="ltxt" placeholder="What happened aboard? Work done, conditions, things to remember…"></textarea>
    <div class="crow" id="placerow" style="display:none">
      <input type="text" id="lplace" placeholder="Where to? (e.g. Smith Island, fuel dock)">
    </div>
    <div class="attach" id="latt"></div>
    <div class="crow" style="justify-content:flex-end"><button class="btn teal slim" id="lsave">${I('check','sm')} Add to log</button></div>`;
  c.appendChild(comp);m.appendChild(c);
  let ltype='note',lphs=[];
  const tseg=comp.querySelector('#ltype');
  tseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    ltype=b.dataset.t;
    tseg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    comp.querySelector('#placerow').style.display=ltype==='trip'?'flex':'none'});
  function drawAtt(){const a=comp.querySelector('#latt');a.innerHTML='';
    lphs.forEach(id=>{const w=document.createElement('div');w.className='athumb';
      w.innerHTML=`<img data-ph="${id}"><button class="ax">✕</button>`;
      w.querySelector('.ax').onclick=async()=>{await PB.del(id);lphs=lphs.filter(x=>x!==id);drawAtt()};
      a.appendChild(w)});hydrate(a)}
  comp.querySelector('#lcam').onclick=()=>{if(lphs.length>=3){toast('Up to 3 photos per entry');return}
    pickPhoto(id=>{lphs.push(id);drawAtt()})};
  comp.querySelector('#lsave').onclick=()=>{
    const txt=comp.querySelector('#ltxt').value.trim();
    const place=comp.querySelector('#lplace').value.trim();
    if(!txt&&!lphs.length){toast('Write something first');return}
    S.log.unshift({id:uid(),ts:Date.now(),type:ltype,txt:txt||(ltype==='trip'?'Trip':'Note'),
      place:ltype==='trip'&&place?place:null,ph:lphs.length?lphs:null,role:S.role});
    lphs=[];save();draw();toast(ltype==='trip'?'Trip logged':'Note added');buzz()};

  const lc=cardEl('book','Ship’s log',`<span class="pill"><span class="dot"></span>${S.log.length}</span>`);
  if(!S.log.length){const e=document.createElement('div');e.className='empty';
    e.innerHTML=`${I('book')}<div class="et">Nothing yet — checks, services, notes and trips all land here with time, hours and who did it.</div>`;
    lc.appendChild(e)}
  let lastDay='';
  S.log.slice(0,150).forEach(e=>{
    const d=new Date(e.ts);const day=d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
    if(day!==lastDay){lastDay=day;const dh=document.createElement('div');dh.className='logday';dh.textContent=day;lc.appendChild(dh)}
    const r=document.createElement('div');r.className='logrow';
    const tchip=e.type==='trip'?`<span class="chip trip">TRIP</span>`:e.type==='note'?`<span class="chip note2">NOTE</span>`:'';
    r.innerHTML=`<span class="t">${fmtT(e.ts)}</span>
      <div class="lbody"><b>${esc(e.txt)}</b>
        <div class="lsub">${tchip}${e.place?`${I('pin','xs')} ${esc(e.place)}`:''}${e.h!=null?`<span>${e.h} hrs</span>`:''}<span>· ${e.role}</span></div>
        ${e.ph?`<div class="lthumbs">${e.ph.map(p=>`<img data-ph="${p}">`).join('')}</div>`:''}</div>
      <button class="ibtn">${I('trash')}</button>`;
    armBtn(r.querySelector('.ibtn'),async()=>{
      if(e.ph)for(const p of e.ph)await PB.del(p);
      S.log.splice(S.log.indexOf(e),1);save();draw();toast('Entry deleted')});
    lc.appendChild(r)});
  m.appendChild(lc)}

      save();closeSheet();draw();toast('Filed on the boat’s tag')})};
  sh.querySelector('#dc').onclick=closeSheet}

function itemSheet(seed){
  const isEdit=seed&&seed.id;const i=isEdit?seed:{name:seed?.name||'',cat:seed?.cat||'Oil & Fluids',part:'',note:'',qty:0,par:0};
  const cats=['Oil & Fluids','Filters','Belts & Impellers','Zincs & Hardware','Cleaning & Finish','Safety','Other'];
  const sh=openSheet(`<h2>${isEdit?'Edit item':'Add supply item'}</h2>
    <p class="sub">Your proven pick — brand, spec, part number — plus how many to keep aboard.</p>
    <div class="f"><label>Item</label><input type="text" id="in" value="${esc(i.name)}" placeholder="e.g. Rotella T6 15W-40"></div>
    <div class="f"><label>Category</label><div class="segs" id="ic"></div></div>
    <div class="f"><label>Part # / spec (optional)</label><input type="text" id="ip" value="${esc(i.part||'')}" placeholder="e.g. Racor S3213 · 2 gal jug"></div>
    <div class="f"><label>Note (optional)</label><input type="text" id="io" value="${esc(i.note||'')}" placeholder="e.g. West Marine carries it; fits both engines"></div>
    <div class="f" style="display:flex;gap:12px">
      <div style="flex:1"><label>On board now</label><input type="number" id="iq" inputmode="numeric" value="${i.qty||0}" min="0"></div>
      <div style="flex:1"><label>Par level (keep at)</label><input type="number" id="ir" inputmode="numeric" value="${i.par||0}" min="0"></div></div>
    <button class="btn teal" id="is">Save</button>
    ${isEdit?`<button class="btn ghost" id="idel" style="margin-top:8px;color:var(--red)">Delete item</button>`:''}
    <button class="btn ghost" id="ix" style="margin-top:8px">Cancel</button>`);
  let cat=i.cat;
  cats.forEach(c0=>{const b=document.createElement('button');b.textContent=c0;
    if(c0===cat)b.className='on';
    b.onclick=()=>{cat=c0;sh.querySelectorAll('#ic button').forEach(x=>x.classList.toggle('on',x.textContent===c0))};
    sh.querySelector('#ic').appendChild(b)});
  sh.querySelector('#is').onclick=()=>{
    const name=sh.querySelector('#in').value.trim();
    if(!name){toast('Name the item');return}
    const upd={name,cat,part:sh.querySelector('#ip').value.trim(),note:sh.querySelector('#io').value.trim(),
      qty:Math.max(0,+sh.querySelector('#iq').value||0),par:Math.max(0,+sh.querySelector('#ir').value||0)};
    if(isEdit)Object.assign(i,upd);
    else S.items.push({id:uid(),...upd});
    save();closeSheet();draw();toast(isEdit?'Item updated':'Added to supplies')};
  if(isEdit)sh.querySelector('#idel').onclick=()=>{
    S.items.splice(S.items.indexOf(i),1);save();closeSheet();draw();toast('Item deleted')};
  sh.querySelector('#ix').onclick=closeSheet}

/* ---------- setup ---------- */
function setupSheet(first){
  const c=S.cfg?{...S.cfg}:{name:'',engines:1,engType:'inboard',fuel:'diesel',gen:false,ac:false,trailer:false,salt:true};
  function render(){
    const sh=openSheet(`<h2>${first?'Set up your boat':'Boat setup'}</h2>
      <p class="sub">30 seconds — this shapes every checklist and service clock.</p>
      <div class="f"><label>Boat name</label><input type="text" id="bn" placeholder="e.g. Reel Therapy" value="${esc(c.name)}"></div>
      <div id="segsbox"></div>
      <button class="btn teal" id="go">${first?'Start the log →':'Save'}</button>
      ${first?'':'<button class="btn ghost" id="cx" style="margin-top:8px">Cancel</button>'}`);
    const seg=(lab,opts,val,cb)=>{const f=document.createElement('div');f.className='f';
      f.innerHTML=`<label>${lab}</label>`;
      const d=document.createElement('div');d.className='segs';
      opts.forEach(([v,l])=>{const b=document.createElement('button');b.textContent=l;
        if(v===val)b.className='on';
        b.onclick=()=>{cb(v);render()};d.appendChild(b)});
      f.appendChild(d);sh.querySelector('#segsbox').appendChild(f)};
    seg('Engines',[[1,'Single'],[2,'Twin']],c.engines,v=>c.engines=v);
    seg('Engine type',[['inboard','Inboard / sterndrive'],['outboard','Outboard']],c.engType,v=>c.engType=v);
    seg('Fuel',[['diesel','Diesel'],['gas','Gas']],c.fuel,v=>c.fuel=v);
    seg('Generator aboard?',[[true,'Yes'],[false,'No']],c.gen,v=>c.gen=v);
    seg('Air conditioning?',[[true,'Yes'],[false,'No']],c.ac,v=>c.ac=v);
    seg('Trailered?',[[true,'Yes'],[false,'No']],c.trailer,v=>c.trailer=v);
    seg('Water',[[true,'Salt / brackish'],[false,'Fresh']],c.salt,v=>c.salt=v);
    sh.querySelector('#bn').oninput=e=>c.name=e.target.value;
    sh.querySelector('#go').onclick=()=>{c.name=(c.name||'').trim()||'My Boat';S.cfg=c;save();
      closeSheet();draw()};
    const cx=sh.querySelector('#cx');if(cx)cx.onclick=closeSheet}
  render()}
$('#gearBtn').onclick=()=>setupSheet(false);

/* ---------- draw ---------- */
function draw(){header();nav();
  const m=$('#main');m.innerHTML='';
  if(!S.cfg){setupSheet(true);return}
  ({today:vToday,hours:vHours,sched:vSched,boat:vBoat,log:vLog}[S.view]||vToday)(m);
  hydrate(m)}
draw();
if('serviceWorker' in navigator&&location.protocol==='https:'){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
