<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#081821" />
<title>Boat Log — scan · log hours · check off</title>
<style>
  :root{
    --ink:#0B1B24; --deep:#081821; --panel:#0E2632;
    --teal:#00C2AE; --tealdk:#0A8578; --wave:#2286A9;
    --amber:#E8A13A; --red:#E05252; --green:#2FA37A;
    --line:#E2E9EC; --tint:#F2F7F8; --grey:#5F6E76; --white:#fff;
    --shadow:0 1px 2px rgba(11,27,36,.06),0 4px 14px rgba(11,27,36,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#EAF0F2;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  button{font-family:inherit}
  .wrap{max-width:640px;margin:0 auto;min-height:100vh;padding-bottom:84px}

  /* header */
  header{background:linear-gradient(165deg,#0E2C3A 0%,var(--deep) 70%);color:#fff;padding:14px 16px 18px;
    border-radius:0 0 22px 22px;position:relative;overflow:hidden}
  header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:26px;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 24" preserveAspectRatio="none"><path d="M0 14 Q50 4 100 14 T200 14 T300 14 T400 14 V24 H0 Z" fill="%23EAF0F2"/></svg>') repeat-x;
    background-size:400px 24px;opacity:.98}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-weight:800;font-size:17px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal)}
  .gear{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#cfe2e6;
    border-radius:10px;padding:7px 10px;font-size:14px}
  .hello{margin-top:12px}
  .hello .hi{font-size:22px;font-weight:800;letter-spacing:.2px}
  .hello .sub{font-size:12.5px;color:#8FB0BB;margin-top:3px}
  .rolebar{display:flex;gap:6px;margin-top:12px;padding-bottom:6px}
  .rolebar button{background:rgba(255,255,255,.08);color:#cfe2e6;border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:700}
  .rolebar button.on{background:var(--teal);color:#03241f;border-color:var(--teal)}

  main{padding:14px 12px 8px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    margin-bottom:14px;overflow:hidden}
  .card>.hd{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:13px 15px 11px;border-bottom:1px solid var(--line)}
  .card>.hd h2{margin:0;font-size:14.5px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .card>.hd .tag{font-size:11px;font-weight:800;color:var(--grey);background:var(--tint);
    border-radius:999px;padding:3px 9px}
  .card>.hd .tag.warn{background:#FBEEDC;color:#9C6410}
  .card>.hd .tag.bad{background:#FCE7E7;color:var(--red)}
  .card>.hd .tag.good{background:#E4F4EE;color:var(--tealdk)}

  /* meters */
  .meters{padding:8px 12px 12px}
  .mrow{display:flex;align-items:center;gap:10px;padding:9px 4px}
  .mrow+.mrow{border-top:1px dashed var(--line)}
  .mico{flex:none;width:38px;height:38px;border-radius:11px;background:var(--tint);display:flex;
    align-items:center;justify-content:center;font-size:18px}
  .mname{flex:1;min-width:0}
  .mname b{font-size:14px}
  .mlast{font-size:11.5px;color:var(--grey)}
  .mrow input{width:96px;font-size:19px;font-weight:800;text-align:right;color:var(--ink);
    border:none;border-bottom:2px solid var(--line);padding:3px 2px;outline:none;background:transparent}
  .mrow input:focus{border-bottom-color:var(--teal)}
  .mrow .delta{font-size:11px;font-weight:800;color:var(--tealdk);width:52px;text-align:right}
  .savebar{display:flex;justify-content:flex-end;padding:4px 12px 12px}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:11px 18px;
    font-size:14px;font-weight:800}
  .btn.teal{background:var(--teal);color:#03241f}
  .btn.ghost{background:var(--tint);color:var(--ink);border:1px solid var(--line);font-weight:700}
  .merr{font-size:12px;color:var(--red);padding:0 16px 10px;display:none}

  /* due section */
  .due .task{border-left:4px solid transparent}
  .due .task.overdue{border-left-color:var(--red)}
  .due .task.soon{border-left-color:var(--amber)}

  /* tasks */
  .grp{border-bottom:1px solid var(--line)}
  .grp:last-child{border-bottom:none}
  .grp>.ghd{display:flex;align-items:center;gap:8px;padding:11px 15px;background:#FBFDFD;cursor:pointer}
  .grp>.ghd h3{margin:0;font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--wave);flex:1}
  .gcount{font-size:11px;font-weight:800;color:var(--grey)}
  .chev{color:#B9C6CC;font-size:12px;transition:.15s}
  .grp.open .chev{transform:rotate(90deg)}
  .glist{display:none}
  .grp.open .glist{display:block}
  .task{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border-top:1px solid var(--line)}
  .cbx{flex:none;width:27px;height:27px;border-radius:9px;border:2px solid #C4D0D6;background:#fff;
    margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:.15s}
  .task.done .cbx{background:var(--green);border-color:var(--green)}
  .task.done .lbl{color:#9AA7AD;text-decoration:line-through}
  .tbody{flex:1;min-width:0}
  .lbl{font-size:14.5px;font-weight:650;line-height:1.3}
  .meta{margin-top:4px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .chip{font-size:10px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:999px;
    background:var(--tint);color:var(--grey)}
  .chip.eq{background:#E9F1F4;color:var(--wave)}
  .chip.salt{background:#E4F6F2;color:var(--tealdk)}
  .chip.gas{background:#FDECEC;color:var(--red)}
  .note{font-size:11.5px;color:var(--grey);margin-top:3px;line-height:1.35}
  .st{font-size:12px;font-weight:800;margin-top:4px}
  .st.ok{color:var(--green)} .st.soon{color:#B0122A00} .st.soon{color:var(--amber)} .st.bad{color:var(--red)} .st.base{color:var(--wave)}
  .pbar{height:5px;background:var(--tint);border-radius:99px;overflow:hidden;margin-top:7px}
  .pbar i{display:block;height:100%;background:var(--teal)}
  .pbar i.warn{background:var(--amber)} .pbar i.bad{background:var(--red)}
  .actrow{margin-top:9px;display:flex;gap:8px}
  .mini{background:var(--tint);border:1px solid var(--line);border-radius:9px;padding:7px 11px;
    font-size:12px;font-weight:800;color:var(--ink)}
  .mini.go{background:var(--teal);border-color:var(--teal);color:#03241f}

  /* ready banner */
  .ready{background:linear-gradient(135deg,#0F7D68,#0A8578);color:#fff;border-radius:16px;
    padding:16px;display:none;align-items:center;gap:12px;margin-bottom:14px;box-shadow:var(--shadow)}
  .ready.show{display:flex}
  .ready .big{font-size:16px;font-weight:800}
  .ready .sm{font-size:12px;opacity:.85}

  .prog{height:7px;background:#DDE7EA;border-radius:99px;overflow:hidden;margin:0 4px 12px}
  .prog i{display:block;height:100%;background:var(--teal);transition:.25s}
  .hint{font-size:12px;color:var(--grey);text-align:center;margin:8px 6px 14px;line-height:1.45}

  /* hours view */
  .meterhead{display:flex;align-items:baseline;gap:10px;padding:14px 15px 4px}
  .meterhead .big{font-size:30px;font-weight:800}
  .meterhead .unit{font-size:12px;color:var(--grey);font-weight:700}
  .meterhead .upd{margin-left:auto;font-size:11px;color:var(--grey)}

  /* schedule */
  .duedate{font-size:12px;font-weight:800}
  .duedate.ok{color:var(--green)} .duedate.soon{color:var(--amber)} .duedate.bad{color:var(--red)} .duedate.base{color:var(--wave)}

  /* log */
  .logday{padding:10px 15px 4px;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--wave);font-weight:800}
  .logrow{display:flex;gap:10px;padding:10px 15px;border-top:1px solid var(--line);font-size:13px}
  .logrow .t{color:var(--grey);flex:none;width:52px;font-variant-numeric:tabular-nums}
  .logrow b{font-weight:700}
  .logrow .who{margin-left:auto;color:var(--grey);font-size:11px}

  /* bottom nav */
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:9px 0 8px;font-size:10.5px;font-weight:800;
    color:#93A3AA;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .i{font-size:19px;line-height:1}
  nav button.on{color:var(--tealdk)}
  nav button .bub{position:absolute;transform:translate(16px,-4px);background:var(--red);color:#fff;
    font-size:10px;font-weight:800;border-radius:99px;min-width:16px;padding:1px 4px}

  /* setup overlay */
  .ov{position:fixed;inset:0;background:rgba(8,24,33,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .ov.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:640px;border-radius:22px 22px 0 0;padding:20px 18px 26px;
    max-height:88vh;overflow:auto}
  .sheet h2{margin:0 0 4px;font-size:19px}
  .sheet .sub{font-size:13px;color:var(--grey);margin-bottom:16px}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--wave);
    font-weight:800;margin-bottom:6px}
  .f input[type=text]{width:100%;font-size:16px;padding:11px 12px;border:1.5px solid var(--line);
    border-radius:11px;outline:none}
  .f input[type=text]:focus{border-color:var(--teal)}
  .segs{display:flex;flex-wrap:wrap;gap:7px}
  .segs button{background:var(--tint);border:1.5px solid var(--line);border-radius:11px;
    padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--ink)}
  .segs button.on{background:#E4F6F2;border-color:var(--teal);color:var(--tealdk)}
  .sheet .btn{width:100%;margin-top:6px;padding:14px;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="toprow">
      <div class="brand"><span class="dot"></span> <span id="boatTitle">Boat Log</span></div>
      <button class="gear" id="gearBtn">⚙︎</button>
    </div>
    <div class="hello">
      <div class="hi" id="hi">Welcome aboard</div>
      <div class="sub" id="hisub"></div>
    </div>
    <div class="rolebar" id="roles"></div>
  </header>

  <main id="main"></main>

  <nav id="nav"></nav>
</div>

<div class="ov" id="ov">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* =========================================================
   TASK SEED v2 — equipment-scoped, meter-bound, researched
   cad: pre | post | weekly | monthly | cal (calendar interval, months) | rt (runtime) | big
   meter: 'eng' (instantiated per engine), 'gen', null
   engType: 'inboard' | 'outboard' | null(any)   gas: gas-engines-only
   iv: hours interval   calM: calendar backstop months
   ========================================================= */
/*TASKS_START*/
const TASKS=[
 /* ---------- DAILY · PRE-DEPARTURE ---------- */
 {"id":"PD01","eq":"Engine","t":"Check engine oil level (dipstick, before start)","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD02","eq":"Engine","t":"Check coolant level (closed cooling)","cad":"pre","g":"Engine & Systems","aud":"mate","engType":"inboard"},
 {"id":"PD03","eq":"Fuel","t":"Fuel level — enough for trip + 1/3 reserve","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD04","eq":"Cooling","t":"Open raw-water seacock / confirm intake clear","cad":"pre","g":"Engine & Systems","aud":"mate","engType":"inboard"},
 {"id":"PD05","eq":"Engine","t":"Visual sweep: belts, hoses, clamps, no fluid under engine","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD06","eq":"Bilge","t":"GAS: run blower 4+ min, sniff bilge before start","cad":"pre","g":"Engine & Systems","aud":"mate","gas":true,"note":"Fume ignition is the #1 gas-boat killer"},
 {"id":"PD07","eq":"Engine","t":"Start engines — confirm water flow / telltale + steady idle","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD08","eq":"Generator","t":"Start genset briefly — confirm water discharge + voltage","cad":"pre","g":"Engine & Systems","aud":"mate","needs":"gen"},
 {"id":"PD09","eq":"Bilge","t":"Bilge dry · pump + float switch work · drain plug IN","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD10","eq":"Electrical","t":"Batteries on, charged; gauges + electronics up","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD11","eq":"Steering","t":"Wheel hard-over both ways; throttle/shift smooth","cad":"pre","g":"Engine & Systems","aud":"mate"},
 {"id":"PD12","eq":"Safety","t":"PFDs — one wearable per person + throwable","cad":"pre","g":"Safety (USCG)","aud":"mate"},
 {"id":"PD13","eq":"Safety","t":"Fire extinguishers charged, pinned, accessible","cad":"pre","g":"Safety (USCG)","aud":"mate"},
 {"id":"PD14","eq":"Safety","t":"Flares / distress signals in date (42-month expiry)","cad":"pre","g":"Safety (USCG)","aud":"mate"},
 {"id":"PD15","eq":"Safety","t":"Horn works · nav/anchor lights work","cad":"pre","g":"Safety (USCG)","aud":"mate"},
 {"id":"PD16","eq":"Safety","t":"VHF check (ch. 16 monitor + radio check)","cad":"pre","g":"Safety (USCG)","aud":"mate"},
 {"id":"PD17","eq":"Deck","t":"Anchor + rode ready to deploy; lines & fenders aboard","cad":"pre","g":"Departure","aud":"mate"},
 {"id":"PD18","eq":"General","t":"Weather, tide, and route checked","cad":"pre","g":"Departure","aud":"captain"},
 {"id":"PD19","eq":"General","t":"Float plan left ashore (longer trips)","cad":"pre","g":"Departure","aud":"captain"},

 /* ---------- DAILY · POST-TRIP ---------- */
 {"id":"PT01","eq":"Engine","t":"Freshwater flush engines (muffs / flush port)","cad":"post","g":"Post-Trip","aud":"mate","salt":true,"note":"The single most important saltwater habit"},
 {"id":"PT02","eq":"Hull","t":"Freshwater rinse hull, deck, hardware, tower","cad":"post","g":"Post-Trip","aud":"mate","salt":true},
 {"id":"PT03","eq":"Interior","t":"Wipe down vinyl + electronics; dry surfaces","cad":"post","g":"Post-Trip","aud":"mate"},
 {"id":"PT04","eq":"Engine","t":"Log engine + generator hours (top of Today)","cad":"post","g":"Post-Trip","aud":"mate","note":"Hours drive every service trigger below"},
 {"id":"PT05","eq":"Bilge","t":"Re-check bilge dry; pumps auto","cad":"post","g":"Post-Trip","aud":"mate"},
 {"id":"PT06","eq":"Electrical","t":"Shore power / charger on; fridge as needed","cad":"post","g":"Post-Trip","aud":"mate"},
 {"id":"PT07","eq":"Deck","t":"Cover on, gear stowed, trash off","cad":"post","g":"Post-Trip","aud":"mate"},

 /* ---------- WEEKLY ---------- */
 {"id":"W01","eq":"Hull","t":"Wash + chamois hull and topsides","cad":"weekly","aud":"mate"},
 {"id":"W02","eq":"Interior","t":"Clean + UV-treat vinyl, upholstery, canvas","cad":"weekly","aud":"mate"},
 {"id":"W03","eq":"Cooling","t":"Open + clean engine raw-water strainer(s)","cad":"weekly","aud":"mate","salt":true,"engType":"inboard"},
 {"id":"W04","eq":"A/C","t":"Clean A/C raw-water strainer","cad":"weekly","aud":"mate","salt":true,"needs":"ac","note":"Weekly in heavy season — clogged strainer = HP fault"},
 {"id":"W05","eq":"Bilge","t":"Test every bilge pump + float switch manually","cad":"weekly","aud":"mate"},
 {"id":"W06","eq":"Electrical","t":"Battery terminals tight/clean; water level (flooded)","cad":"weekly","aud":"captain"},
 {"id":"W07","eq":"Running gear","t":"Glance anodes/zincs at waterline gear","cad":"weekly","aud":"captain","salt":true},
 {"id":"W08","eq":"Deck","t":"Dock lines + fender whips — chafe check","cad":"weekly","aud":"mate"},
 {"id":"W09","eq":"Head","t":"Head + holding tank service / treatment","cad":"weekly","aud":"mate"},

 /* ---------- MONTHLY ---------- */
 {"id":"M01","eq":"Safety","t":"Full safety audit: counts, expirations, extinguisher gauges","cad":"monthly","aud":"captain"},
 {"id":"M02","eq":"Fuel","t":"Fuel system leak sweep; drain water separator bowl","cad":"monthly","aud":"captain"},
 {"id":"M03","eq":"Steering","t":"Steering fluid/cable + throttle/shift inspection","cad":"monthly","aud":"captain"},
 {"id":"M04","eq":"Engine","t":"Belt tension + cracking check","cad":"monthly","aud":"captain","engType":"inboard"},
 {"id":"M05","eq":"Hull","t":"Through-hulls: exercise seacocks, check double clamps","cad":"monthly","aud":"captain","engType":"inboard"},
 {"id":"M06","eq":"Running gear","t":"Prop check: dings, fishing line at seal, shaft play","cad":"monthly","aud":"captain"},
 {"id":"M07","eq":"Generator","t":"Exercise genset under load 30–60 min","cad":"monthly","aud":"captain","needs":"gen","note":"Unloaded running glazes cylinders"},
 {"id":"M08","eq":"A/C","t":"Clean A/C return-air filters; check condensate drain","cad":"monthly","aud":"mate","needs":"ac"},
 {"id":"M09","eq":"Electrical","t":"Test GFCI / ELCI; inspect shore cord ends for heat","cad":"monthly","aud":"captain"},
 {"id":"M10","eq":"Trailer","t":"(Trailered) bearings, lights, straps, winch","cad":"monthly","aud":"owner","needs":"trailer"},

 /* ---------- CALENDAR (months interval) ---------- */
 {"id":"C01","eq":"Running gear","t":"Replace shaft/trim/hull zinc anodes","cad":"cal","calM":6,"aud":"captain","salt":true,"note":"Or at 250 hrs — whichever first (also listed under hours)"},
 {"id":"C02","eq":"Electrical","t":"Load-test batteries; clean + coat terminals","cad":"cal","calM":6,"aud":"captain"},
 {"id":"C03","eq":"Electrical","t":"Corrosion + bonding-system inspection","cad":"cal","calM":6,"aud":"owner","salt":true},
 {"id":"C04","eq":"Cooling","t":"Service + grease seacocks / ball valves","cad":"cal","calM":6,"aud":"captain","engType":"inboard"},
 {"id":"C05","eq":"A/C","t":"Descale/flush A/C raw-water loop; clean condenser coil","cad":"cal","calM":12,"aud":"owner","needs":"ac","salt":true},
 {"id":"C06","eq":"Hull","t":"Haul-out: bottom clean + antifouling paint","cad":"cal","calM":12,"aud":"owner","salt":true},
 {"id":"C07","eq":"Running gear","t":"Haul-out: prop, shaft, cutless bearing, strut survey","cad":"cal","calM":12,"aud":"owner"},
 {"id":"C08","eq":"Safety","t":"Extinguishers professionally inspected/recharged","cad":"cal","calM":12,"aud":"owner"},
 {"id":"C09","eq":"Safety","t":"Replace flares expiring before next season","cad":"cal","calM":12,"aud":"owner"},
 {"id":"C10","eq":"Safety","t":"Life raft repack + EPIRB battery/registration","cad":"cal","calM":12,"aud":"owner","note":"If equipped — per unit schedule"},
 {"id":"C11","eq":"Drive","t":"Sterndrive: bellows, gimbal, u-joint inspection","cad":"cal","calM":12,"aud":"owner","engType":"inboard","note":"Sterndrive boats"},
 {"id":"C12","eq":"Fuel","t":"Inspect/replace primary fuel-water separators (dock filters)","cad":"cal","calM":12,"aud":"owner"},
 {"id":"C13","eq":"Canvas","t":"Re-waterproof canvas; inspect isinglass + zippers","cad":"cal","calM":12,"aud":"mate"},

 /* ---------- RUNTIME · ENGINE (per engine meter) ---------- */
 {"id":"RE00","eq":"Engine","t":"Break-in service: oil + filter + gear lube","cad":"rt","meter":"eng","iv":20,"once":true,"aud":"owner","note":"New/rebuilt engines · 20-hr mark"},
 {"id":"RE01i","eq":"Engine","t":"Engine oil + filter change","cad":"rt","meter":"eng","iv":150,"calM":12,"aud":"owner","engType":"inboard","note":"Diesel 100–250 hrs typical (Cummins up to 500 on ULSD) · gas ~100"},
 {"id":"RE01o","eq":"Engine","t":"100-hr service: oil + filter, gear lube, fuel filter, greasing","cad":"rt","meter":"eng","iv":100,"calM":12,"aud":"owner","engType":"outboard","note":"The outboard 100-hr / annual service"},
 {"id":"RE02","eq":"Engine","t":"Engine zinc anodes (heat exchanger / block)","cad":"rt","meter":"eng","iv":250,"calM":6,"aud":"captain","salt":true},
 {"id":"RE03","eq":"Engine","t":"Drive belts — check/adjust, replace if cracked","cad":"rt","meter":"eng","iv":250,"calM":12,"aud":"captain","engType":"inboard"},
 {"id":"RE04","eq":"Fuel","t":"Engine fuel filters / water separator replace","cad":"rt","meter":"eng","iv":300,"calM":12,"aud":"owner"},
 {"id":"RE05","eq":"Cooling","t":"Raw-water pump impeller replace","cad":"rt","meter":"eng","iv":300,"calM":12,"aud":"owner","salt":true,"engType":"inboard","note":"Inspect annually even at low hours"},
 {"id":"RE06","eq":"Cooling","t":"Seawater hoses, clamps, battery cables, harness check","cad":"rt","meter":"eng","iv":500,"calM":12,"aud":"captain","engType":"inboard"},
 {"id":"RE07","eq":"Cooling","t":"Coolant condition + heat-exchanger cap test","cad":"rt","meter":"eng","iv":500,"calM":12,"aud":"owner","engType":"inboard"},
 {"id":"RE08","eq":"Transmission","t":"Transmission / gear oil change","cad":"rt","meter":"eng","iv":300,"calM":12,"aud":"owner","engType":"inboard"},
 {"id":"RE09o","eq":"Engine","t":"300-hr: water pump impeller, spark plugs, thermostats","cad":"rt","meter":"eng","iv":300,"calM":36,"aud":"owner","engType":"outboard","note":"The outboard 300-hr service"},
 {"id":"RE10","eq":"Engine","t":"Valve / overhead adjustment (diesel)","cad":"rt","meter":"eng","iv":1500,"aud":"owner","engType":"inboard","note":"Mechanic job"},
 {"id":"RE11","eq":"Cooling","t":"Cooling system full flush + refill","cad":"rt","meter":"eng","iv":2000,"calM":48,"aud":"owner","engType":"inboard"},
 {"id":"RE12","eq":"Engine","t":"Vibration damper clean / check","cad":"rt","meter":"eng","iv":2000,"calM":48,"aud":"owner","engType":"inboard"},

 /* ---------- RUNTIME · GENERATOR (gen meter) ---------- */
 {"id":"RG00","eq":"Generator","t":"Genset break-in oil + filter","cad":"rt","meter":"gen","iv":50,"once":true,"aud":"owner","needs":"gen","note":"New units · ~50-hr mark"},
 {"id":"RG01","eq":"Generator","t":"Genset oil + filter change","cad":"rt","meter":"gen","iv":150,"calM":12,"aud":"owner","needs":"gen","note":"Onan/Kohler: 150–200 hrs or annual"},
 {"id":"RG02","eq":"Generator","t":"Genset raw-water impeller replace","cad":"rt","meter":"gen","iv":400,"calM":12,"aud":"owner","needs":"gen","salt":true},

/* ---------- state ---------- */
const KEY='boatlog.v2';
let S=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
S.cfg=S.cfg||null;           // {name, engines, engType, gen, ac, trailer, salt}
S.role=S.role||'mate';
S.view=S.view||'today';
S.meters=S.meters||{};       // id -> {h, ts}
S.done=S.done||{};           // periodic checkoffs
S.rt=S.rt||{};               // instId -> {h, d}
S.cal=S.cal||{};             // calId -> ISO date last done
S.log=S.log||[];             // {ts, txt, meter, h, role}

const now=()=>new Date();
const todayISO=()=>now().toISOString().slice(0,10);
function weekKey(){const d=now(),y=d.getFullYear(),o=new Date(y,0,1);
  return y+'-W'+Math.ceil(((d-o)/864e5+o.getDay()+1)/7)}
const monthKey=()=>now().toISOString().slice(0,7);
const pKey=c=>c==='pre'||c==='post'?todayISO():c==='weekly'?weekKey():c==='monthly'?monthKey():'x';
const dk=t=>t.id+'@'+pKey(t.cad);
function logIt(txt,meter,h){S.log.unshift({ts:Date.now(),txt,meter:meter||null,h:h??null,role:S.role});
  if(S.log.length>400)S.log.length=400;}

/* meters from config */
function meterDefs(){ if(!S.cfg)return[];
  const m=[];const eng=S.cfg.engines;
  if(eng===2){m.push({id:'eng1',name:'Port Engine',icon:'⚙️',kind:'eng'});
              m.push({id:'eng2',name:'Stbd Engine',icon:'⚙️',kind:'eng'});}
  else m.push({id:'eng1',name:S.cfg.engType==='outboard'?'Outboard':'Main Engine',icon:'⚙️',kind:'eng'});
  if(S.cfg.gen)m.push({id:'gen',name:'Generator',icon:'🔌',kind:'gen'});
  return m;}

/* task applicability */
function applies(t){ const c=S.cfg; if(!c)return false;
  if(t.salt&&!c.salt)return false;
  if(t.gas&&c.fuel!=='gas')return false;
  if(t.engType&&t.engType!==c.engType)return false;
  if(t.needs==='gen'&&!c.gen)return false;
  if(t.needs==='ac'&&!c.ac)return false;
  if(t.needs==='trailer'&&!c.trailer)return false;
  return true;}
function roleOK(t){ if(S.role==='all')return true;
  if(S.role===t.aud)return true;
  if(S.role==='captain'&&t.aud==='mate')return true;
  if(S.role==='owner')return true; return false;}

/* runtime instances (per meter) */
function rtInstances(){ const out=[];
  TASKS.filter(t=>t.cad==='rt'&&applies(t)).forEach(t=>{
    meterDefs().filter(m=>m.kind===t.meter).forEach(m=>{
      out.push({t,m,inst:t.id+'@'+m.id});});});
  return out;}

function rtStatus(x){ const rec=S.rt[x.inst]; const cur=S.meters[x.m.id]?.h;
  if(rec==null) return {cls:'base',txt:'No baseline — mark last done to start tracking',pct:0};
  if(x.t.once&&rec) return {cls:'ok',txt:'Done ✓ (one-time)',pct:100};
  const dueH=rec.h+x.t.iv;
  const hLeft=cur!=null?dueH-cur:null;
  let dLeft=null,dueDate=null;
  if(x.t.calM){dueDate=new Date(rec.d);dueDate.setMonth(dueDate.getMonth()+x.t.calM);
    dLeft=Math.ceil((dueDate-now())/864e5);}
  const hoursOver=hLeft!=null&&hLeft<=0, dateOver=dLeft!=null&&dLeft<=0;
  const hoursSoon=hLeft!=null&&hLeft<=Math.max(25,x.t.iv*.15), dateSoon=dLeft!=null&&dLeft<=30;
  const pct=cur!=null?Math.min(100,Math.max(0,Math.round((cur-rec.h)/x.t.iv*100))):0;
  const dd=dueDate?dueDate.toLocaleDateString(undefined,dueDate.getFullYear()===now().getFullYear()?{month:'short',day:'numeric'}:{month:'short',day:'numeric',year:'numeric'}):null;
  if(hoursOver||dateOver)return{cls:'bad',pct:100,
    txt:hoursOver?`OVERDUE — ${Math.abs(hLeft)} hrs past (due at ${dueH})`:`OVERDUE — was due ${dd}`};
  if(hoursSoon||dateSoon)return{cls:'soon',pct,
    txt:hLeft!=null?`Due soon — ${hLeft} hrs to go (at ${dueH}${dd?` or ${dd}`:''})`:`Due soon — by ${dd}`};
  return{cls:'ok',pct,
    txt:hLeft!=null?`OK — ${hLeft} hrs to go (at ${dueH}${dd?` or ${dd}`:''})`:`OK — next by ${dd}`};}

function calStatus(t){ const last=S.cal[t.id];
  if(!last)return{cls:'base',txt:'No baseline — mark last done'};
  const due=new Date(last);due.setMonth(due.getMonth()+t.calM);
  const dLeft=Math.ceil((due-now())/864e5);
  const dd=due.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  if(dLeft<=0)return{cls:'bad',txt:`OVERDUE — was due ${dd}`};
  if(dLeft<=30)return{cls:'soon',txt:`Due soon — ${dd}`};
  return{cls:'ok',txt:`Next due ${dd}`};}

function dueList(){ const out=[];
  rtInstances().forEach(x=>{const st=rtStatus(x);
    if(st.cls==='bad'||st.cls==='soon')out.push({kind:'rt',x,st});});
  TASKS.filter(t=>t.cad==='cal'&&applies(t)).forEach(t=>{const st=calStatus(t);
    if(st.cls==='bad'||st.cls==='soon')out.push({kind:'cal',t,st});});
  out.sort((a,b)=>(a.st.cls==='bad'?0:1)-(b.st.cls==='bad'?0:1));
  return out;}

/* ---------- render helpers ---------- */
const $=s=>document.querySelector(s);
function chips(t,extra){let h=`<span class="chip eq">${t.eq}</span>`;
  if(t.salt)h+=`<span class="chip salt">SALT</span>`;
  if(t.gas)h+=`<span class="chip gas">GAS</span>`;
  if(extra)h+=extra; return h;}

function header(){ const h=now().getHours();
  $('#hi').textContent=(h<12?'Morning aboard':h<17?'Afternoon aboard':'Evening aboard')+
    (S.cfg?` — ${S.cfg.name}`:'');
  $('#hisub').textContent=now().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  $('#boatTitle').textContent=S.cfg?S.cfg.name:'Boat Log';
  const R=[['mate','Mate'],['captain','Captain'],['owner','Owner']];
  const rb=$('#roles');rb.innerHTML='';
  R.forEach(([k,l])=>{const b=document.createElement('button');b.textContent=l;
    if(S.role===k)b.className='on';
    b.onclick=()=>{S.role=k;save();draw()};rb.appendChild(b);});}

const NAV=[['today','⚓','Today'],['hours','⏱','Hours'],['sched','🗓','Schedule'],['log','📜','Log']];
function nav(){const n=$('#nav');n.innerHTML='';
  const dueN=dueList().length;
  NAV.forEach(([k,i,l])=>{const b=document.createElement('button');
    if(S.view===k)b.className='on';
    b.innerHTML=`<span class="i">${i}</span>${l}${k==='today'&&dueN?`<span class="bub">${dueN}</span>`:''}`;
    b.onclick=()=>{S.view=k;save();draw()};n.appendChild(b);});}

function taskRow(t,opts={}){ const k=dk(t);const isDone=!!S.done[k];
  const div=document.createElement('div');div.className='task'+(isDone?' done':'');
  div.innerHTML=`<div class="cbx">${isDone?'✓':''}</div><div class="tbody">
    <div class="lbl">${t.t}</div><div class="meta">${chips(t)}</div>
    ${t.note?`<div class="note">${t.note}</div>`:''}
    ${isDone?`<div class="note">✓ ${new Date(S.done[k].ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})} · ${S.done[k].role}</div>`:''}</div>`;
  div.onclick=()=>{ if(S.done[k]){delete S.done[k];}
    else{S.done[k]={ts:Date.now(),role:S.role};logIt(t.t);}
    save();draw();};
  return div;}

function group(title,tasks,openDefault){ const g=document.createElement('div');
  const doneN=tasks.filter(t=>S.done[dk(t)]).length;
  const open=openDefault??(doneN<tasks.length);
  g.className='grp'+(open?' open':'');
  g.innerHTML=`<div class="ghd"><h3>${title}</h3>
    <span class="gcount">${doneN}/${tasks.length}</span><span class="chev">▶</span></div>
    <div class="glist"></div>`;
  const list=g.querySelector('.glist');
  tasks.forEach(t=>list.appendChild(taskRow(t)));
  g.querySelector('.ghd').onclick=()=>{g.classList.toggle('open')};
  return g;}

/* mark-done for rt / cal */
function markRt(x){ const cur=S.meters[x.m.id]?.h;
  if(cur==null){alert('Log '+x.m.name+' hours first — the service is recorded at a meter reading.');return;}
  S.rt[x.inst]={h:cur,d:todayISO()};
  logIt(x.t.t+' — '+x.m.name,x.m.name,cur);save();draw();}
function markCal(t){S.cal[t.id]=todayISO();logIt(t.t);save();draw();}

/* ---------- views ---------- */
function vToday(m){
  /* meters card */
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<div class="hd"><h2>⏱ Log today's hours</h2>
    <span class="tag" id="mtag"></span></div>
    <div class="meters" id="mrows"></div><div class="merr" id="merr"></div>
    <div class="savebar"><button class="btn teal" id="msave">Save readings</button></div>`;
  const rows=card.querySelector('#mrows');
  meterDefs().forEach(md=>{const rec=S.meters[md.id];
    const r=document.createElement('div');r.className='mrow';
    r.innerHTML=`<div class="mico">${md.icon}</div>
      <div class="mname"><b>${md.name}</b><div class="mlast">${rec?`last ${rec.h} hrs · ${new Date(rec.ts).toLocaleDateString(undefined,{month:'short',day:'numeric'})}`:'no reading yet'}</div></div>
      <input inputmode="decimal" type="number" step="0.1" data-m="${md.id}" placeholder="${rec?rec.h:'0'}">
      <div class="delta" data-d="${md.id}"></div>`;
    rows.appendChild(r);});
  const anyRec=meterDefs().some(md=>S.meters[md.id]);
  card.querySelector('#mtag').textContent=anyRec?'tracking':'start here';
  card.querySelector('#msave').onclick=()=>{
    const err=card.querySelector('#merr');err.style.display='none';
    let saved=0;
    for(const inp of card.querySelectorAll('input[data-m]')){
      const v=inp.value.trim();if(v==='')continue;
      const nv=+v;const id=inp.dataset.m;const rec=S.meters[id];
      if(rec&&nv<rec.h&&!inp.dataset.force){
        err.textContent=`${meterDefs().find(x=>x.id===id).name}: ${nv} is lower than last (${rec.h}). Tap Save again to force (meter replaced).`;
        err.style.display='block';inp.dataset.force='1';return;}
      const delta=rec?(nv-rec.h):0;
      S.meters[id]={h:nv,ts:Date.now()};
      card.querySelector(`[data-d="${id}"]`).textContent=rec?`+${delta.toFixed(1)}`:'set';
      logIt(`Hours logged — ${meterDefs().find(x=>x.id===id).name}: ${nv}`,null,nv);saved++;}
    if(saved){save();setTimeout(draw,350);}};
  m.appendChild(card);

  /* due now */
  const due=dueList();
  if(due.length){
    const dcard=document.createElement('div');dcard.className='card due';
    dcard.innerHTML=`<div class="hd"><h2>🔧 Service triggered</h2>
      <span class="tag ${due.some(d=>d.st.cls==='bad')?'bad':'warn'}">${due.length} due</span></div>`;
    due.forEach(d=>{const row=document.createElement('div');
      row.className='task '+(d.st.cls==='bad'?'overdue':'soon');
      if(d.kind==='rt'){row.innerHTML=`<div class="tbody">
        <div class="lbl">${d.x.t.t}</div>
        <div class="meta">${chips(d.x.t,`<span class="chip">${d.x.m.name}</span><span class="chip">every ${d.x.t.iv} hrs${d.x.t.calM?' / '+d.x.t.calM+' mo':''}</span>`)}</div>
        <div class="st ${d.st.cls}">${d.st.txt}</div>
        <div class="actrow"><button class="mini go">✓ Done today at ${S.meters[d.x.m.id]?.h??'—'} hrs</button></div></div>`;
        row.querySelector('.mini').onclick=e=>{e.stopPropagation();markRt(d.x);};}
      else{row.innerHTML=`<div class="tbody"><div class="lbl">${d.t.t}</div>
        <div class="meta">${chips(d.t,`<span class="chip">every ${d.t.calM} mo</span>`)}</div>
        <div class="st ${d.st.cls}">${d.st.txt}</div>
        <div class="actrow"><button class="mini go">✓ Done today</button></div></div>`;
        row.querySelector('.mini').onclick=e=>{e.stopPropagation();markCal(d.t);};}
      dcard.appendChild(row);});
    m.appendChild(dcard);
  }

  /* pre-departure */
  const pre=TASKS.filter(t=>t.cad==='pre'&&applies(t)&&roleOK(t));
  const preDone=pre.filter(t=>S.done[dk(t)]).length;
  const ready=document.createElement('div');ready.className='ready'+(pre.length&&preDone===pre.length?' show':'');
  ready.innerHTML=`<div style="font-size:26px">✅</div><div><div class="big">Vessel ready</div>
    <div class="sm">Pre-departure complete — ${preDone}/${pre.length} · logged by ${S.role}</div></div>`;
  m.appendChild(ready);
  const prog=document.createElement('div');prog.className='prog';
  prog.innerHTML=`<i style="width:${pre.length?Math.round(preDone/pre.length*100):0}%"></i>`;
  m.appendChild(prog);

  const pcard=document.createElement('div');pcard.className='card';
  pcard.innerHTML=`<div class="hd"><h2>☀️ Pre-departure</h2><span class="tag">${preDone}/${pre.length}</span></div>`;
  ['Engine & Systems','Safety (USCG)','Departure'].forEach(gname=>{
    const gt=pre.filter(t=>t.g===gname);if(gt.length)pcard.appendChild(group(gname,gt));});
  m.appendChild(pcard);

  /* post-trip */
  const post=TASKS.filter(t=>t.cad==='post'&&applies(t)&&roleOK(t));
  const postDone=post.filter(t=>S.done[dk(t)]).length;
  const pt=document.createElement('div');pt.className='card';
  pt.innerHTML=`<div class="hd"><h2>🌙 Post-trip</h2><span class="tag">${postDone}/${post.length}</span></div>`;
  pt.appendChild(group('Wash down & shutdown',post,postDone<post.length&&postDone>0));
  m.appendChild(pt);

  const hint=document.createElement('p');hint.className='hint';
  hint.textContent='Checklists reset daily. Hours you log here drive the service triggers automatically.';
  m.appendChild(hint);
}

/* ---------- setup ---------- */

  function render(){

    mk('Fuel',seg([['diesel','Diesel'],['gas','Gas']],c.fuel,v=>c.fuel=v));
    mk('Generator aboard?',seg([[true,'Yes'],[false,'No']],c.gen,v=>c.gen=v));
    mk('Air conditioning?',seg([[true,'Yes'],[false,'No']],c.ac,v=>c.ac=v));
    mk('Trailered?',seg([[true,'Yes'],[false,'No']],c.trailer,v=>c.trailer=v));
    mk('Water',seg([[true,'Salt / brackish'],[false,'Fresh']],c.salt,v=>c.salt=v));
    const go=document.createElement('button');go.className='btn teal';
    go.textContent=first?'Start the log →':'Save';
    go.onclick=()=>{c.name=$('#bn').value.trim()||'My Boat';S.cfg=c;save();
      ov.classList.remove('show');draw();};
    sh.appendChild(go);
    if(!first){const x=document.createElement('button');x.className='btn ghost';x.style.cssText='width:100%;margin-top:8px';
      x.textContent='Cancel';x.onclick=()=>ov.classList.remove('show');sh.appendChild(x);}
  }
  render();
}
$('#gearBtn').onclick=()=>setupSheet(false);

/* ---------- draw ---------- */
function draw(){ header();nav();
  const m=$('#main');m.innerHTML='';
  if(!S.cfg){setupSheet(true);return;}
  ({today:vToday,hours:vHours,sched:vSched,log:vLog}[S.view]||vToday)(m);
}
draw();
</script>
</body>
